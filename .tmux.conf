
# マウス操作を有効にする
set-option -g mouse on

# クリップボードを有効にする
set -g set-clipboard on

set -g prefix C-Space
unbind-key -n C-o
bind -n C-left select-pane -L
bind -n C-down select-pane -D
bind -n C-up select-pane -U
bind -n C-right select-pane -R
bind -n S-left previous-window
bind -n S-right next-window

# prefixキーをCtrl + Spaceに変更する
# set -g prefix C-Space

# デフォルトのprefixキーC-bを解除する
# unbind C-b

# prefix+hでペインを垂直分割する
bind h split-window -v

# prefix+vでペインを水平分割する
bind v split-window -h

# ペインの移動
# bind -n C-M-o select-pane -t :.+
# bind -n C-M-left select-pane -L
# bind -n C-M-down select-pane -D
# bind -n C-M-up select-pane -U
# bind -n C-M-right select-pane -R

# ウィンドウを切り替える
# bind -n C-S-left previous-window
# bind -n C-S-right next-window

# 256色 + True Color + UTF-8 設定
set-option -g default-terminal "tmux-256color"
# 外側ターミナルの True Color / Nerd Font ワイド文字幅をそのまま引き継ぐ
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*:U8=0"
set -gq utf8 on
set -gq status-utf8 on

# 画像プロトコル（iTerm2/Kitty）のパススルーを許可
set -g allow-passthrough on

# ステータスラインの色を変更
setw -g status-style fg=colour45,bg=colour240

# status-leftを非表示にする
set -g status-left ""

# status-rightを非表示にする
set -g status-right ""

# window-statusの見た目を変更
setw -g window-status-current-format '#[bg=colour240,fg=colour45] #I #W '
setw -g window-status-format '#[fg=colour248] #I #W '
